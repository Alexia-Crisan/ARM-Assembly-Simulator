<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ARM Assembly Simulator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="editor">
      <h2>Assembly Code</h2>

      <div id="editor-wrapper">
        <div id="line-numbers">1</div>
        <textarea id="codeArea" spellcheck="false">
          ; Gauss sum  1..6 = 21
          MOV R0, #6
          MOV R1, #0      ; sum = 0
          MOV R2, #1      ; counter = 1
          ADD R0, R0, #1
          sum_loop:
          ADD R1, R1, R2  ; sum += counter
          ADD R2, #1
          CMP R2, R0
          BNE sum_loop
          HLT</textarea
        >
      </div>

      <div id="btn-bar">
        <button class="btn-primary" onclick="assembleAndRun()">
          ▶ Assemble &amp; Run
        </button>
        <button class="btn-secondary" onclick="resetProgram()">↺ Reset</button>
        <button class="btn-docs" onclick="goToDocs()">⊞ Instructions</button>
      </div>
    </div>

    <div id="output">
      <h2>Visualization</h2>
      <div id="results">
        <p style="color: #555; font-size: 13px">
          Run a program to see results here.
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
